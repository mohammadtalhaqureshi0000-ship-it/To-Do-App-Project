<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="card" style="width: 500px;">
        <div class="card-body">
            <h5 class="card-title">To Do App</h5>
            <input type="text" id="taskInput" class="form-control mb-2" placeholder="Enter your task">
            <button type="button" id="btn" class="btn btn-primary mb-3 w-100">
                + Add Task
            </button>
            <ul class="list-group d-block" id="showtext" >
                <!-- <button>Edit</button> <button>Delete</button> -->
            </ul>
        </div>
    </div>
    <script src="./script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
